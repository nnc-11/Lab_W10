apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8smaxdeploymentreplicas
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  crd:
    spec:
      names:
        kind: K8sMaxDeploymentReplicas
      validation:
        openAPIV3Schema:
          type: object
          properties:
            maxReplicas:
              type: integer
  targets:
  - target: admission.k8s.gatekeeper.sh
    rego: |
      package k8smaxdeploymentreplicas

      violation[{"msg": msg}] {
        replicas := input.review.object.spec.replicas
        max_replicas := input.parameters.maxReplicas
        replicas > max_replicas
        msg := sprintf("Deployment <%v> replicas %v exceeds max allowed %v", [input.review.object.metadata.name, replicas, max_replicas])
      }
---
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sMaxDeploymentReplicas
metadata:
  name: max-deployment-replicas
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  enforcementAction: deny
  match:
    excludedNamespaces:
    - kube-system
    - argocd
    - argo-rollouts
    - monitoring
    - gatekeeper-system
    kinds:
    - apiGroups: ["apps"]
      kinds: ["Deployment"]
  parameters:
    maxReplicas: 5
